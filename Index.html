<!DOCTYPE html>
<html>
<head>
    <title>HyperRealm</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: white;
            text-align: center;
        }

        header {
            background: linear-gradient(90deg, #001a00, #003300);
            padding: 40px;
        }

        h1 {
            font-size: 50px;
            color: #00ff66;
        }

        .section {
            padding: 50px;
        }

        .card {
            background-color: #111;
            margin: 20px auto;
            padding: 20px;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 15px #00ff66;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            padding: 20px;
            background-color: #001a00;
            color: #00ff66;
        }
    </style>
</head>
<body>

<header>
    <h1>HyperRealm</h1>
    <p>Green Speed. Hypercar Energy.</p>
</header>

<div class="section">
    <div class="card">
        <h2>Koenigsegg Jesko</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Koenigsegg_Jesko_Geneva_2019.jpg">
        <p>The ultimate hypercar built for extreme speed and performance.</p>
    </div>
</div>

<footer>
    <p>© 2026 HyperRealm | Built for Speed</p>
</footer>

</body>
</html>
